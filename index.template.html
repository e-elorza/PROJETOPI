<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>GerRep</title>
  <link rel="stylesheet" href="/styles.css"> <!-- CSS -->
</head>
<body>
  <h1><a href="/">GerRep</a></h1>
  <h2>Cadastro de clientes:</h2>



  <form action="/salvar_cliente" method="get">
    <input type="text" name="nome_empresa" placeholder="Nome da empresa"> <br>
    <input type="text" name="cnpj" maxlength="14" placeholder="CNPJ"> <br>
    <input type="text" name="nome_pessoa" placeholder="Nome do representante"><br>
    <button type="submit">Salvar</button>
  </form>

  <h3>Meus clientes</h3>
  <table border="1">
  <thead>
    <tr>
      <th>Empresa</th>
      <th>Ações</th>
    </tr>
  </thead>
  <tbody>
    __LISTACLIENTES__
  </tbody>
</table>
</body>
</html>
